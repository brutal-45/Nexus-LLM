[tox] 
envlist = py39, py310, py311, py312, lint, typecheck
skip_missing_interpreters = true
minversion = 4.0

[testenv]
description = Run the test suite
deps =
    -r requirements.txt
    -r requirements-dev.txt
commands =
    pytest tests/ -v --tb=short {posargs}
passenv =
    CUDA_VISIBLE_DEVICES
    HF_TOKEN
    NEXUS_LLM_*
    HOME

[testenv:py39]
basepython = python3.9

[testenv:py310]
basepython = python3.10

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12

[testenv:lint]
description = Run all linters
basepython = python3.11
deps =
    flake8>=6.1.0
    flake8-docstrings>=1.7.0
    flake8-bugbear>=23.0.0
    ruff>=0.1.0
    black>=23.0.0
    isort>=5.12.0
commands =
    ruff check nexus_llm/
    flake8 nexus_llm/
    black --check --diff nexus_llm/
    isort --check-only --diff nexus_llm/

[testenv:typecheck]
description = Run type checking with mypy
basepython = python3.11
deps =
    mypy>=1.5.0
    types-PyYAML
    types-requests
    types-tqdm
commands =
    mypy nexus_llm/

[testenv:format]
description = Auto-format code
basepython = python3.11
deps =
    black>=23.0.0
    isort>=5.12.0
commands =
    black nexus_llm/
    isort nexus_llm/

[testenv:coverage]
description = Run tests with coverage report
basepython = python3.11
deps =
    -r requirements.txt
    -r requirements-dev.txt
commands =
    pytest tests/ -v --cov=nexus_llm --cov-report=html --cov-report=term-missing {posargs}

[testenv:clean]
description = Clean build artifacts
basepython = python3.11
deps =
commands =
    python -c "import shutil; import os; [shutil.rmtree(d) for d in ['build', 'dist', '.eggs', 'htmlcov', '.tox', '.mypy_cache', '.pytest_cache', '.ruff_cache'] if os.path.exists(d)]"
    python -c "import glob; [os.remove(f) for f in glob.glob('*.egg-info') if os.path.isfile(f)]"
    python -c "import shutil, glob; [shutil.rmtree(d) for d in glob.glob('*.egg-info') if os.path.isdir(d)]"

[testenv:dev]
description = Set up development environment
basepython = python3.11
deps =
    -r requirements.txt
    -r requirements-dev.txt
    pre-commit
commands =
    pip install -e .
    pre-commit install
    python -c "print('Development environment ready!')"
