# Codecov configuration for Nexus-LLM

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true
  max_report_age: 24h

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2%
        if_ci_failed: error
        only_pulls: false
      core:
        target: 85%
        paths:
          - "nexus_llm/backend/"
          - "nexus_llm/training/"
          - "nexus_llm/api/"
      utils:
        target: 90%
        paths:
          - "nexus_llm/utils/"
          - "nexus_llm/config/"

    patch:
      default:
        target: 75%
        threshold: 5%
        if_ci_failed: error

    changes:
      default:
        branches:
          - main
          - develop

  ignore:
    - "tests/**/*"
    - "scripts/**/*"
    - "docs/**/*"
    - "**/__init__.py"
    - "**/conftest.py"
    - "setup.py"
    - "nexus_llm/__version__.py"
    - "nexus_llm/__main__.py"

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

github_checks:
  annotations: true
