name: Tests
 
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=nexus_llm \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=html:coverage-unit-html \
            --junitxml=test-results/unit.xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: |
            coverage-unit.xml
            coverage-unit-html/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-results-${{ matrix.python-version }}
          path: test-results/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test,integration]"

      - name: Run integration tests
        env:
          REDIS_URL: redis://localhost:6379
          NEXUS_TEST_MODE: "1"
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --cov=nexus_llm \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration.xml \
            --junitxml=test-results/integration.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration
          path: coverage-integration.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-results
          path: test-results/

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - name: Download coverage data
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate combined coverage report
        run: |
          pip install coverage
          coverage combine coverage-unit.xml coverage-integration.xml || true
          coverage report -m || true
          coverage xml -o coverage-combined.xml || true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage-unit.xml,coverage-integration.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  gpu-tests:
    name: GPU Tests
    runs-on: [self-hosted, gpu]
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'gpu-test')
    needs: unit-tests

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install CUDA dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test,gpu]"

      - name: Verify GPU
        run: nvidia-smi

      - name: Run GPU tests
        run: |
          pytest tests/gpu/ \
            -v \
            --tb=short \
            --junitxml=test-results/gpu.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gpu-results
          path: test-results/
