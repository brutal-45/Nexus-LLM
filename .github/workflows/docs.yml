name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install sphinx>=7.2.0 sphinx-rtd-theme>=2.0.0 sphinx-autodoc-typehints>=1.25.0

      - name: Build docs
        run: |
          if [ -f docs/Makefile ]; then
            cd docs && make html
          elif [ -f docs/conf.py ]; then
            sphinx-build -b html docs docs/_build/html
          else
            echo "No docs configuration found. Creating minimal docs setup..."
            mkdir -p docs
            cat > docs/conf.py << 'SPHINX_CONF'
            project = 'Nexus-LLM'
            copyright = '2024 Nexus-LLM Team'
            author = 'Nexus-LLM Team'
            extensions = ['sphinx.ext.autodoc', 'sphinx.ext.napoleon', 'sphinx.ext.viewcode', 'sphinx_autodoc_typehints']
            templates_path = ['_templates']
            exclude_patterns = ['_build', 'Thumbs.db', '.DS_Store']
            html_theme = 'sphinx_rtd_theme'
            SPHINX_CONF
            sphinx-build -b html docs docs/_build/html
          fi

      - name: Upload docs artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy-docs:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4