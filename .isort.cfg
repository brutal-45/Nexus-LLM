[settings]
# Isort configuration for Nexus-LLM
# Aligned with Black formatting

profile = black
line_length = 88

# Import grouping
known_first_party = nexus_llm
known_third_party =
    torch
    transformers
    accelerate
    peft
    bitsandbytes
    safetensors
    datasets
    tokenizers
    huggingface_hub
    yaml
    click
    rich
    fastapi
    uvicorn
    pydantic
    pytest
    aiohttp
    httpx
    numpy
    scipy
    sklearn

# Section ordering
sections =
    FUTURE
    STDLIB
    THIRDPARTY
    FIRSTPARTY
    LOCALFOLDER

# Formatting
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True

# Indent
indent = 4

# Skip
skip =
    .git
    __pycache__
    build
    dist
    .eggs
    .tox
    .venv
    venv

skip_glob =
    */migrations/*
    */node_modules/*

# Force single-line imports from specific modules
force_single_line =
    torch
    transformers

# Split before dot
split_before_trailing_comma = False
