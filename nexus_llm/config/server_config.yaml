# Nexus-LLM Server Configuration
# Host, port, workers, CORS, rate limiting, and API settings

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  reload: false
  debug: false
  access_log: true
  log_level: "info"

  # Application
  app_name: "Nexus-LLM"
  api_prefix: "/api/v1"
  docs_url: "/docs"
  redoc_url: "/redoc"
  openapi_url: "/openapi.json"

  # TLS
  ssl_certfile: null
  ssl_keyfile: null
  ssl_keyfile_password: null

  # Timeouts
  request_timeout: 120                # seconds
  keep_alive_timeout: 5               # seconds
  graceful_shutdown_timeout: 30        # seconds

  # Limits
  max_request_size: 10485760          # 10MB
  max_connections: 1000
  max_concurrent_requests: 100
  backlog: 2048

cors:
  enabled: true
  allow_origins:
    - "*"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "*"
  allow_credentials: false
  max_age: 600
  expose_headers: []

rate_limiting:
  enabled: true
  requests_per_minute: 60
  requests_per_hour: 1000
  burst_size: 10
  storage: "memory"                   # memory, redis
  redis_url: "redis://localhost:6379/0"

auth:
  enabled: false
  secret_key: "change-me-in-production"
  algorithm: "HS256"
  access_token_expire_minutes: 30
  refresh_token_expire_days: 7
  api_key_header: "X-API-Key"
  api_keys: []

caching:
  enabled: true
  backend: "memory"                   # memory, redis
  ttl: 300                            # seconds
  max_size: 1000
  redis_url: "redis://localhost:6379/1"

streaming:
  enabled: true
  chunk_size: 1024
  heartbeat_interval: 15              # seconds
  max_duration: 300                   # seconds

health:
  enabled: true
  endpoint: "/health"
  check_interval: 30                  # seconds
  models_check: true
  memory_threshold: 90                # percent

metrics:
  enabled: true
  endpoint: "/metrics"
  prometheus: false
  collect_interval: 10                # seconds
