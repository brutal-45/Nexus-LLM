# Nexus-LLM Inference Presets
# Pre-configured settings for different inference scenarios

presets:
  # Fast inference with minimal quality
  fast:
    description: "Optimized for speed, lower quality"
    temperature: 0.3
    top_p: 0.9
    top_k: 40
    max_tokens: 512
    repetition_penalty: 1.1
    frequency_penalty: 0.0
    presence_penalty: 0.0
    beam_width: 1
    do_sample: true

  # Balanced quality and speed
  balanced:
    description: "Good balance of quality and speed"
    temperature: 0.7
    top_p: 0.95
    top_k: 50
    max_tokens: 2048
    repetition_penalty: 1.2
    frequency_penalty: 0.1
    presence_penalty: 0.1
    beam_width: 1
    do_sample: true

  # High quality, slower inference
  quality:
    description: "Maximum quality, slower inference"
    temperature: 0.5
    top_p: 0.98
    top_k: 100
    max_tokens: 4096
    repetition_penalty: 1.3
    frequency_penalty: 0.2
    presence_penalty: 0.2
    beam_width: 3
    do_sample: true

  # Creative writing
  creative:
    description: "For creative and diverse outputs"
    temperature: 1.0
    top_p: 0.95
    top_k: 80
    max_tokens: 4096
    repetition_penalty: 1.1
    frequency_penalty: 0.0
    presence_penalty: 0.3
    beam_width: 1
    do_sample: true

  # Code generation
  code:
    description: "Optimized for code generation"
    temperature: 0.2
    top_p: 0.95
    top_k: 40
    max_tokens: 2048
    repetition_penalty: 1.1
    frequency_penalty: 0.0
    presence_penalty: 0.0
    beam_width: 1
    do_sample: false

  # Deterministic output
  deterministic:
    description: "Fully deterministic, no randomness"
    temperature: 0.0
    top_p: 1.0
    top_k: 1
    max_tokens: 1024
    repetition_penalty: 1.0
    frequency_penalty: 0.0
    presence_penalty: 0.0
    beam_width: 1
    do_sample: false

  # Streaming optimized
  streaming:
    description: "Optimized for real-time streaming"
    temperature: 0.7
    top_p: 0.9
    top_k: 50
    max_tokens: 256
    repetition_penalty: 1.1
    frequency_penalty: 0.0
    presence_penalty: 0.0
    beam_width: 1
    do_sample: true
    chunk_size: 16
